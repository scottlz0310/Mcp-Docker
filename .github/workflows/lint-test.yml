name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-node:
    name: Nodeテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Node.jsセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: '20.20.2'

      - name: Nodeテスト実行
        run: npm test

  lint-shell:
    name: シェルスクリプトLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: shellcheckインストール
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: シェルスクリプトLint実行
        run: bash scripts/lint-shell.sh

  test-shell:
    name: シェルスクリプトテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Batsインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      
      - name: シェルスクリプトテスト実行
        run: bats tests/shell/*.bats
