name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-shell:
    name: シェルスクリプトLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: shellcheckインストール
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: シェルスクリプトLint実行
        run: bash scripts/lint-shell.sh

  test-shell:
    name: シェルスクリプトテスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Batsインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      
      - name: シェルスクリプトテスト実行
        run: bats tests/shell/*.bats

  test-go:
    name: Go CLI チェック（vet/test/build）
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Go セットアップ
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

      - name: Go テスト
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: カバレッジファイル確認
        run: test -s coverage.out

      - name: Codecov アップロード
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: go-cli
          name: go-cli
          use_oidc: true
          fail_ci_if_error: true
          verbose: true

      - name: Go ビルド
        run: go build ./cmd/mcp-docker
