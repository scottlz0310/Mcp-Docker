name: Workflow Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Goセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: actionlint実行
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
