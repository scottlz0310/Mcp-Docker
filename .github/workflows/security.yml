name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:


permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Repository Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.ci-helper,.venv,dist
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  github-mcp-scan:
    name: github-mcp Official Image Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Pull official github-mcp-server image
        run: docker pull ghcr.io/github/github-mcp-server:main

      - name: Run Trivy scan on github-mcp-server image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/github/github-mcp-server:main
          format: sarif
          output: trivy-github-mcp-results.sarif
          vuln-type: os,library
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy github-mcp results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-github-mcp-results.sarif

  copilot-review-mcp-scan:
    name: copilot-review-mcp Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build copilot-review-mcp image
        run: |
          docker build \
            -f services/copilot-review-mcp/Dockerfile \
            -t copilot-review-mcp:security-scan \
            services/copilot-review-mcp

      - name: Run Trivy scan on copilot-review-mcp image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: copilot-review-mcp:security-scan
          format: sarif
          output: trivy-crm-results.sarif
          vuln-type: os,library
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy copilot-review-mcp results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-crm-results.sarif
