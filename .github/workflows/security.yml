name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  GITHUB_MCP_GO_SDK_VERSION: ${{ vars.GITHUB_MCP_GO_SDK_VERSION || 'v1.3.1' }}
  SECURITY_SCAN_IMAGE: github-mcp-server:security-scan

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Repository Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.ci-helper,.venv,dist
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy filesystem results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build patched GitHub MCP Server image
        env:
          GITHUB_MCP_SERVER_REF: ${{ vars.GITHUB_MCP_SERVER_REF }}
        run: |
          build_args=(
            --build-arg GO_SDK_VERSION=${{ env.GITHUB_MCP_GO_SDK_VERSION }}
          )

          if [ -n "$GITHUB_MCP_SERVER_REF" ]; then
            build_args+=(--build-arg GITHUB_MCP_SERVER_REF=$GITHUB_MCP_SERVER_REF)
          fi

          docker build \
            "${build_args[@]}" \
            -f Dockerfile.github-mcp-server \
            -t ${{ env.SECURITY_SCAN_IMAGE }} \
            .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SECURITY_SCAN_IMAGE }}
          format: sarif
          output: trivy-container-results.sarif
          vuln-type: os,library
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy container results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-container-results.sarif
