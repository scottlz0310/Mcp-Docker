name: リリース

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: テスト・lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  build:
    name: ビルド (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: バイナリビルド
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          BIN="mcp-docker-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "${BIN}" ./cmd/mcp-docker
          sha256sum "${BIN}" > "${BIN}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.suffix }}
          path: |
            mcp-docker-${{ matrix.suffix }}${{ matrix.ext }}
            mcp-docker-${{ matrix.suffix }}${{ matrix.ext }}.sha256

  release:
    name: リリース作成
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: チェックサムファイル統合
        run: |
          cat dist/*.sha256 | sort > dist/checksums.txt

      - name: GitHub Release 作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/mcp-docker-* \
            dist/checksums.txt
