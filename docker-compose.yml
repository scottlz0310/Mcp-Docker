services:
  github-mcp:
    image: ${GITHUB_MCP_IMAGE:-ghcr.io/github/github-mcp-server:main}
    container_name: mcp-github
    restart: unless-stopped
    command: ["http", "--port", "${GITHUB_MCP_HTTP_PORT:-8082}"]

    environment:
      - MCP_GITHUB_PAT=${MCP_GITHUB_PAT:-${GITHUB_PERSONAL_ACCESS_TOKEN}}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}

    volumes:
      - ./config/github-mcp:/app/config
      - github-mcp-cache:/app/cache

    # Exposed only within the Docker network. Direct host access is intentionally
    # removed; use github-oauth-proxy (:8084) for authenticated external access.
    expose:
      - "${GITHUB_MCP_HTTP_PORT:-8082}"

    networks:
      - mcp-network

    # Note: GitHub MCP Server uses a distroless image without shell commands.
    # Health is validated from host side via scripts/health-check.sh.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  github-oauth-proxy:
    build:
      context: ./services/github-oauth-proxy
      dockerfile: Dockerfile
    image: github-oauth-proxy:local
    container_name: github-oauth-proxy
    restart: unless-stopped
    depends_on:
      - github-mcp

    environment:
      - GITHUB_MCP_CLIENT_ID=${GITHUB_MCP_CLIENT_ID}
      - GITHUB_MCP_CLIENT_SECRET=${GITHUB_MCP_CLIENT_SECRET}
      - GITHUB_OAUTH_PROXY_BASE_URL=${GITHUB_OAUTH_PROXY_BASE_URL:-http://localhost:8084}
      - GITHUB_OAUTH_PROXY_PORT=${GITHUB_OAUTH_PROXY_PORT:-8084}
      - GITHUB_MCP_UPSTREAM_URL=${GITHUB_MCP_UPSTREAM_URL:-http://github-mcp:8082}
      - GITHUB_MCP_OAUTH_SCOPES=${GITHUB_MCP_OAUTH_SCOPES:-repo,user}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_TTL_MIN=${SESSION_TTL_MIN:-10}
      - TOKEN_CACHE_TTL_MIN=${TOKEN_CACHE_TTL_MIN:-5}
      - TOKEN_EXPIRES_IN_SEC=${TOKEN_EXPIRES_IN_SEC:-7776000}

    ports:
      - "127.0.0.1:${GITHUB_OAUTH_PROXY_PORT:-8084}:${GITHUB_OAUTH_PROXY_PORT:-8084}"

    networks:
      - mcp-network

    # Note: distroless image has no shell/wget. Health is validated host-side.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  copilot-review-mcp:
    build:
      context: ./services/copilot-review-mcp
      dockerfile: Dockerfile
    image: copilot-review-mcp:local
    container_name: copilot-review-mcp
    restart: unless-stopped
    # distroless:nonroot の UID/GID を明示（UID=65532）。
    # /data ボリュームの初回マウント時、Docker はイメージの /data ディレクトリ
    # （Dockerfile で COPY --chown=nonroot:nonroot 済み）の内容をボリュームに
    # コピーするため、正しいオーナーシップが引き継がれます。
    # 既存の空ボリュームが root 所有になっている場合は
    # "docker volume rm copilot-review-data" で削除後に再作成してください。
    user: "65532:65532"

    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - BASE_URL=${BASE_URL:-http://localhost:8083}
      - GITHUB_OAUTH_SCOPES=${GITHUB_OAUTH_SCOPES:-repo,user}
      - MCP_PORT=${COPILOT_REVIEW_MCP_PORT:-8083}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_TTL_MIN=${SESSION_TTL_MIN:-10}
      - TOKEN_CACHE_TTL_MIN=${TOKEN_CACHE_TTL_MIN:-5}
    ports:
      - "127.0.0.1:${COPILOT_REVIEW_MCP_PORT:-8083}:${COPILOT_REVIEW_MCP_PORT:-8083}"

    volumes:
      - copilot-review-data:/data

    networks:
      - mcp-network

    # Note: distroless image has no shell/wget. Health is validated host-side.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  github-mcp-cache:
    driver: local
  copilot-review-data:
    driver: local

networks:
  mcp-network:
    driver: bridge
