services:
  github-mcp:
    image: ${GITHUB_MCP_IMAGE:-ghcr.io/github/github-mcp-server:main}
    # To use the custom-patched image (adds list_pull_request_review_threads):
    #   make build-custom          # build and tag as mcp-github-patched:latest
    #   make start-custom          # build + start with the patched image
    container_name: mcp-github
    restart: unless-stopped
    command: ["http", "--port", "${GITHUB_MCP_HTTP_PORT:-8082}"]

    environment:
      - MCP_GITHUB_PAT=${MCP_GITHUB_PAT:-${GITHUB_PERSONAL_ACCESS_TOKEN}}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}

    volumes:
      - ./config/github-mcp:/app/config
      - github-mcp-cache:/app/cache

    ports:
      - "127.0.0.1:${GITHUB_MCP_HTTP_PORT:-8082}:${GITHUB_MCP_HTTP_PORT:-8082}"

    networks:
      - mcp-network

    # Note: GitHub MCP Server uses a distroless image without shell commands.
    # Health is validated from host side via scripts/health-check.sh.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  copilot-review-mcp:
    build:
      context: ./services/copilot-review-mcp
      dockerfile: Dockerfile
    image: copilot-review-mcp:local
    container_name: copilot-review-mcp
    restart: unless-stopped

    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - BASE_URL=${BASE_URL:-http://localhost:8083}
      - GITHUB_OAUTH_SCOPES=${GITHUB_OAUTH_SCOPES:-repo,user}
      - MCP_PORT=${COPILOT_REVIEW_MCP_PORT:-8083}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_TTL_MIN=${SESSION_TTL_MIN:-10}
      - TOKEN_CACHE_TTL_MIN=${TOKEN_CACHE_TTL_MIN:-5}
    ports:
      - "127.0.0.1:${COPILOT_REVIEW_MCP_PORT:-8083}:8083"

    networks:
      - mcp-network

    # Note: distroless image has no shell/wget. Health is validated host-side.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  github-mcp-cache:
    driver: local

networks:
  mcp-network:
    driver: bridge
