services:
  github-mcp:
    image: ${GITHUB_MCP_IMAGE:-ghcr.io/github/github-mcp-server:main}
    container_name: mcp-github
    restart: unless-stopped
    command: ["http", "--port", "${GITHUB_MCP_HTTP_PORT:-8082}"]

    environment:
      - MCP_GITHUB_PAT=${MCP_GITHUB_PAT:-${GITHUB_PERSONAL_ACCESS_TOKEN}}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - GITHUB_API_URL=${GITHUB_API_URL:-https://api.github.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}

    volumes:
      - ./config/github-mcp:/app/config
      - github-mcp-cache:/app/cache

    # Exposed only within the Docker network. Direct host access is intentionally
    # removed; use mcp-gateway (:8080) for authenticated external access.
    expose:
      - "${GITHUB_MCP_HTTP_PORT:-8082}"

    networks:
      - mcp-network

    # Note: GitHub MCP Server uses a distroless image without shell commands.
    # Health is validated from host side via scripts/health-check.sh.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  mcp-gateway:
    image: ${GITHUB_MCP_GATEWAY_IMAGE:-ghcr.io/scottlz0310/mcp-gateway:latest}
    container_name: mcp-gateway
    restart: unless-stopped
    depends_on:
      github-mcp:
        condition: service_started
      copilot-review-mcp:
        condition: service_started
      # playwright-mcp はデフォルトで有効化済み。不要な場合はこの行と
      # ROUTE_PLAYWRIGHT 環境変数・playwright-mcp サービス定義を削除してください。
      playwright-mcp:
        condition: service_started

    environment:
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-${GITHUB_MCP_CLIENT_ID}}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-${GITHUB_MCP_CLIENT_SECRET}}
      # v0.4.0 未満のゲートウェイとの後方互換エイリアス
      - GITHUB_MCP_CLIENT_ID=${OAUTH_CLIENT_ID:-${GITHUB_MCP_CLIENT_ID}}
      - GITHUB_MCP_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-${GITHUB_MCP_CLIENT_SECRET}}
      - MCP_GATEWAY_PUBLIC_URL=${MCP_GATEWAY_PUBLIC_URL:-${MCP_GATEWAY_BASE_URL:-http://127.0.0.1:${MCP_GATEWAY_PORT:-8080}}}
      - MCP_GATEWAY_BIND_ADDR=${MCP_GATEWAY_BIND_ADDR:-0.0.0.0:${MCP_GATEWAY_PORT:-8080}}
      - MCP_GATEWAY_PORT=${MCP_GATEWAY_PORT:-8080}
      - MCP_GATEWAY_KEY_PATH=${MCP_GATEWAY_KEY_PATH:-/data/gateway.key}
      - MCP_CONFIG_FILE=${MCP_CONFIG_FILE:-/data/config.yaml}
      - ROUTE_GITHUB=/mcp/github|http://github-mcp:${GITHUB_MCP_HTTP_PORT:-8082}
      - ROUTE_COPILOT_REVIEW=/mcp/copilot-review|http://copilot-review-mcp:${COPILOT_REVIEW_MCP_PORT:-8083}
      - ROUTE_PLAYWRIGHT=/mcp/playwright|http://playwright-mcp:${PLAYWRIGHT_MCP_PORT:-8931}|auth=none
      - OAUTH_SCOPES=${OAUTH_SCOPES:-${GITHUB_MCP_OAUTH_SCOPES:-repo,user}}
      - GITHUB_MCP_OAUTH_SCOPES=${OAUTH_SCOPES:-${GITHUB_MCP_OAUTH_SCOPES:-repo,user}}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_TTL_MIN=${SESSION_TTL_MIN:-10}
      - TOKEN_CACHE_TTL_MIN=${TOKEN_CACHE_TTL_MIN:-30}
      - TOKEN_EXPIRES_IN_SEC=${TOKEN_EXPIRES_IN_SEC:-7776000}
      - MCP_GATEWAY_TOKEN_STORE_PATH=${MCP_GATEWAY_TOKEN_STORE_PATH:-/data/tokens.db}
      - MCP_GATEWAY_GITHUB_REFRESH_ENABLED=${MCP_GATEWAY_GITHUB_REFRESH_ENABLED:-false}

    volumes:
      - mcp-gateway-data:/data

    ports:
      - "127.0.0.1:${MCP_GATEWAY_PORT:-8080}:${MCP_GATEWAY_PORT:-8080}"

    networks:
      - mcp-network

    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  copilot-review-mcp:
    image: ${COPILOT_REVIEW_MCP_IMAGE:-ghcr.io/scottlz0310/copilot-review-mcp:latest}
    container_name: copilot-review-mcp
    restart: unless-stopped
    # distroless:nonroot の UID/GID を明示（UID=65532）。
    # /data ボリュームの初回マウント時、Docker はイメージの /data ディレクトリ
    # （Dockerfile で COPY --chown=nonroot:nonroot 済み）の内容をボリュームに
    # コピーするため、正しいオーナーシップが引き継がれます。
    # 既存の空ボリュームが root 所有になっている場合は
    # "docker volume rm copilot-review-data" で削除後に再作成してください。
    user: "65532:65532"

    environment:
      - BIND_ADDR=0.0.0.0
      - MCP_PORT=${COPILOT_REVIEW_MCP_PORT:-8083}
      - LOG_LEVEL=${LOG_LEVEL:-info}

    # mcp-gateway 経由でのみアクセス（http://127.0.0.1:8080/mcp/copilot-review）。
    # ホストから直接アクセスする場合は下記のコメントを解除してください。
    # ports:
    #   - "127.0.0.1:${COPILOT_REVIEW_MCP_PORT:-8083}:${COPILOT_REVIEW_MCP_PORT:-8083}"
    expose:
      - "${COPILOT_REVIEW_MCP_PORT:-8083}"

    volumes:
      - copilot-review-data:/data

    networks:
      - mcp-network

    # Note: distroless image has no shell/wget. Health is validated host-side.
    healthcheck:
      disable: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # =============================================================================
  # auth=none ルートの例: 認証不要な MCP サーバを追加するパターン（上記が有効化済み）
  # =============================================================================
  # 上記 playwright-mcp サービスが auth=none ルートパターンの実装例です。
  # 新たな認証不要 MCP サーバを追加する場合は同様の手順で追加してください:
  #   1. サービス定義を追加（image, command に --port/--host, expose, networks を指定）
  #   2. mcp-gateway の ROUTE_<NAME>=/<path>|http://<service>:<port>|auth=none を追加
  #   3. mcp-gateway の depends_on に新サービスを追加
  #   4. IDE 設定に "url": "http://127.0.0.1:8080/<path>" を追加
  #   5. make restart
  #
  playwright-mcp:
    image: ${PLAYWRIGHT_MCP_IMAGE:-mcr.microsoft.com/playwright/mcp:latest}
    container_name: playwright-mcp
    restart: unless-stopped
    command: ["--port", "${PLAYWRIGHT_MCP_PORT:-8931}", "--host", "0.0.0.0", "--allowed-hosts", "*"]
    expose:
      - "${PLAYWRIGHT_MCP_PORT:-8931}"
    networks:
      - mcp-network
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  github-mcp-cache:
    driver: local
  copilot-review-data:
    driver: local
  mcp-gateway-data:
    driver: local

networks:
  mcp-network:
    driver: bridge
